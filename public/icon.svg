<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a0f2b"/>
      <stop offset="55%" stop-color="#0a0512"/>
      <stop offset="100%" stop-color="#050506"/>
    </radialGradient>
    <linearGradient id="goldRich" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff7dc"/>
      <stop offset="35%" stop-color="#ffe7a3"/>
      <stop offset="65%" stop-color="#d8a84e"/>
      <stop offset="100%" stop-color="#9c7732"/>
    </linearGradient>
    <linearGradient id="rimGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9c7732"/>
      <stop offset="50%" stop-color="#ffe7a3"/>
      <stop offset="100%" stop-color="#9c7732"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8a84e" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d8a84e" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.55"/>
      <feComposite in2="off" operator="in"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" fill="none" stroke="url(#rimGold)" stroke-width="3" opacity="0.85"/>
  <circle cx="256" cy="240" r="200" fill="url(#halo)"/>

  <!-- Hebrew "א" wordmark — the brand initial -->
  <g transform="translate(256 280)" filter="url(#goldShadow)">
    <text
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'Suez One', 'David Libre', serif"
      font-weight="900"
      font-size="280"
      fill="url(#goldRich)"
      direction="rtl"
      style="paint-order: stroke; stroke: #fff7dc; stroke-width: 2;"
    >א</text>
  </g>

  <!-- Gold tagline -->
  <text
    x="256"
    y="450"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="32"
    fill="#FFE7A3"
    letter-spacing="14"
    direction="rtl"
  >אורל</text>
</svg>
